name: Bug report
description: Report a reproducible artifact-watchdog problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove any private paths, job names, logs, or customer data before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal config, state, artifact tree, and command needed to reproduce.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Which verdict did you expect and why?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "artifact-watchdog 0.1.0, Python 3.12"

