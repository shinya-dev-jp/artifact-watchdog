name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should artifact-watchdog do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What can users do today without this feature?
  - type: textarea
    id: evidence
    attributes:
      label: Evidence of demand
      description: Link or describe the sanitized maintainer workflow, CI failure mode, cron problem, or artifact-output gap this would help.
