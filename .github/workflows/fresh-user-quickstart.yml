name: Fresh User Quickstart

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"

jobs:
  quickstart:
    name: README quickstart from a clean workspace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install artifact-watchdog as a user would
        run: python -m pip install .

      - name: Run demo from a clean temporary workspace
        run: scripts/quickstart_smoke.sh
