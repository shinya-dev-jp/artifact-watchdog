name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sources
        run: python -m py_compile src/artifact_watchdog/*.py

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run failure injection lab
        run: PYTHONPATH=src python scripts/failure_lab.py --workspace "$RUNNER_TEMP/failure-lab"

      - name: Run demo command
        run: |
          PYTHONPATH=src python -m artifact_watchdog.cli \
            --config examples/demo-workspace/watchdog.toml \
            --workspace examples/demo-workspace \
            --date 2026-06-07 \
            --now 2026-06-07T06:00:00+00:00

      - name: Verify fail-on exits non-zero for unhealthy demo
        run: |
          if PYTHONPATH=src python -m artifact_watchdog.cli \
            --config examples/demo-workspace/watchdog.toml \
            --workspace examples/demo-workspace \
            --date 2026-06-07 \
            --now 2026-06-07T06:00:00+00:00 \
            --fail-on any; then
            echo "expected --fail-on any to exit non-zero for the unhealthy demo fixture"
            exit 1
          fi
