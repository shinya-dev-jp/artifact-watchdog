name: Artifact Watchdog

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  audit-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install artifact-watchdog
        run: python -m pip install git+https://github.com/shinya-dev-jp/artifact-watchdog.git

      - name: Audit scheduled artifacts
        run: |
          artifact-watchdog \
            --config examples/artifact-watchdog.toml \
            --workspace . \
            --date "$(date -u +%F)" \
            --markdown "$GITHUB_STEP_SUMMARY" \
            --fail-on any
